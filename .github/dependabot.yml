version: 2

updates:
  # npm packages — wekelijks op maandag
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Europe/Amsterdam"
    open-pull-requests-limit: 5
    groups:
      production-dependencies:
        dependency-type: "production"
      dev-dependencies:
        dependency-type: "development"
    ignore:
      # Geen automatische major-versie updates voor Next.js — die bevatten breaking changes
      - dependency-name: "next"
        update-types: ["version-update:semver-major"]

  # GitHub Actions — wekelijks op maandag
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Europe/Amsterdam"
