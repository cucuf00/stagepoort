version: 2
updates:
  # npm packages (Next.js, Supabase, Resend, Playwright, etc.)
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Europe/Amsterdam"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
    groups:
      supabase:
        patterns:
          - "@supabase/*"
      nextjs:
        patterns:
          - "next"
          - "react"
          - "react-dom"
      playwright:
        patterns:
          - "@playwright/*"

  # GitHub Actions versies
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Europe/Amsterdam"
    labels:
      - "dependencies"
      - "github-actions"
